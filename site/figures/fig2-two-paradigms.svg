<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 390" width="100%">
  <style>
    .ax{stroke:#1a1a1a;stroke-width:.8;fill:none}
    .lab{font-family:'Source Sans 3',sans-serif;font-size:12px;fill:#555}
    .lab-b{font-family:'Source Sans 3',sans-serif;font-size:13px;fill:#2c4a6e;font-weight:600}
    .lab-w{font-family:'Source Sans 3',sans-serif;font-size:13px;fill:#a0664d;font-weight:600}
    .an{font-family:'Source Sans 3',sans-serif;font-size:11px;fill:#555}
    .cv-c{stroke:#2c4a6e;stroke-width:2;fill:none}
    .cv-s{stroke:#a0664d;stroke-width:2;fill:none}
    .cv-h{stroke:#a0664d;stroke-width:1.5;fill:none;stroke-dasharray:5 3}
    .sbg{fill:#a0664d;opacity:.06}
    .dv{stroke:#d4d0c8;stroke-width:1;stroke-dasharray:4 4}
    .mi{font-family:'Source Serif 4',Georgia,serif;font-style:italic;font-size:12px;fill:#1a1a1a}
    .cap{font-family:'Source Sans 3',sans-serif;font-size:12px;fill:#555}
  </style>
  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="#2c4a6e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="aw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="#a0664d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <line class="dv" x1="340" y1="20" x2="340" y2="340"/>

  <!-- LEFT: Calibrated -->
  <text class="lab-b" x="170" y="30" text-anchor="middle">Calibrated instrument</text>
  <line class="ax" x1="60" y1="280" x2="300" y2="280"/>
  <line class="ax" x1="60" y1="280" x2="60" y2="60"/>
  <polygon points="300,280 294,277 294,283" fill="#1a1a1a"/>
  <polygon points="60,60 57,66 63,66" fill="#1a1a1a"/>
  <text class="lab" x="308" y="284">input</text>
  <text class="lab" x="40" y="60" text-anchor="end">output</text>
  <path class="cv-c" d="M80,260 C120,250 180,180 240,100 Q260,72 280,68"/>
  <line x1="160" y1="280" x2="160" y2="194" stroke="#2c4a6e" stroke-width=".8" stroke-dasharray="3 2"/>
  <line x1="60" y1="190" x2="156" y2="190" stroke="#2c4a6e" stroke-width=".8" stroke-dasharray="3 2"/>
  <circle cx="160" cy="190" r="3" fill="#2c4a6e"/>
  <line x1="100" y1="305" x2="100" y2="195" stroke="#2c4a6e" stroke-width="1" fill="none" marker-start="url(#ab)" marker-end="url(#ab)"/>
  <text class="an" x="82" y="255" text-anchor="end" transform="rotate(-90,82,255)">invertible</text>
  <text class="mi" x="200" y="168">f</text>
  <text class="mi" x="112" y="250">f ⁻¹</text>

  <!-- RIGHT: Sentinel -->
  <rect class="sbg" x="345" y="40" width="320" height="300"/>
  <text class="lab-w" x="510" y="30" text-anchor="middle">Sentinel</text>
  <line class="ax" x1="400" y1="280" x2="640" y2="280"/>
  <line class="ax" x1="400" y1="280" x2="400" y2="60"/>
  <polygon points="640,280 634,277 634,283" fill="#1a1a1a"/>
  <polygon points="400,60 397,66 403,66" fill="#1a1a1a"/>
  <text class="lab" x="648" y="284">input</text>
  <text class="lab" x="380" y="60" text-anchor="end">output</text>
  <path class="cv-s" d="M420,260 C440,255 480,240 510,200 C530,170 540,130 550,100 Q560,80 580,74"/>
  <path class="cv-h" d="M580,74 C600,80 610,110 600,150 C590,180 560,220 540,240 Q520,260 500,262"/>
  <line x1="540" y1="280" x2="540" y2="90" stroke="#a0664d" stroke-width=".8" stroke-dasharray="3 2"/>
  <circle cx="540" cy="115" r="3" fill="#a0664d"/>
  <circle cx="540" cy="210" r="3" fill="#a0664d"/>
  <line x1="460" y1="305" x2="460" y2="195" stroke="#a0664d" stroke-width="1" fill="none" marker-end="url(#aw)"/>
  <line x1="452" y1="245" x2="468" y2="260" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="452" y1="260" x2="468" y2="245" stroke="#c0392b" stroke-width="1.5"/>
  <text class="an" x="445" y="230" text-anchor="end" fill="#a0664d">no unique</text>
  <text class="an" x="445" y="243" text-anchor="end" fill="#a0664d">inverse</text>
  <text class="an" x="555" y="165" fill="#a0664d">two outputs</text>
  <text class="an" x="555" y="178" fill="#a0664d">one input</text>
  <polygon points="530,178 526,185 534,183" fill="#a0664d"/>
  <polygon points="582,130 586,122 578,124" fill="#a0664d" opacity=".6"/>

  <text class="cap" x="340" y="360" text-anchor="middle">Fig. 2  Left: a calibrated instrument's smooth, monotonic transfer function supports</text>
  <text class="cap" x="340" y="374" text-anchor="middle">inversion (output → input). Right: near a boundary, the map becomes singular and</text>
  <text class="cap" x="340" y="388" text-anchor="middle">hysteretic — high gain, but no unique inverse. Sensitivity and ambiguity are linked.</text>
</svg>
